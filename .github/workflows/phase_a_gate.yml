# Phase A — Human PR Validation
#
# Runs when a human annotator opens a PR with a creator patch + F2P tests.
# Validates that the patch meets architectural quality standards before the
# task is frozen for Phase B agent evaluation.
#
# Checks enforced:
#   ✓ api_surface_score  — no breaking public API changes
#   ✓ new_dependencies   — no unexpected new external packages
#   ✓ dead_code_count    — no dead code introduced
#
# Not enforced (always 1.0 — no agent reference exists yet):
#   ~ scope_score        — N/A in Phase A
#   ~ blast_ratio        — N/A in Phase A
#
# The architectural_gate package is installed from amanchaudhary-ops/Merge-Bench-Scripts (central repo).
# This workflow file is the only architectural gate artifact that lives in each task repo.

name: Architecture Gate — Phase A (Human PR)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  phase-a-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout task repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Architectural_Gate (architectural_gate source)
        uses: actions/checkout@v4
        with:
          repository: aneesh-spec/Merge-Bench-Scripts
          path: Merge-Bench-Scripts
          token: ${{ secrets.MERGE_BENCH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install architectural_gate from Merge-Bench-Scripts
        run: pip install ./Merge-Bench-Scripts

      - name: Materialize initial vs changed trees
        shell: bash
        run: |
          set -euo pipefail
          echo "ARCH_GATE_JSON_LOG=${GITHUB_WORKSPACE}/architectural-gate-log.json" >> "${GITHUB_ENV}"
          I="${RUNNER_TEMP}/arch-gate-initial"
          C="${RUNNER_TEMP}/arch-gate-changed"
          rm -rf "$I" "$C"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags --depth=50 origin "${BASE_SHA}" "${HEAD_SHA}" 2>/dev/null || git fetch --no-tags --depth=0
          git worktree add "$I" "${BASE_SHA}"
          git worktree add "$C" "${HEAD_SHA}"
          echo "ARCH_GATE_REPO_INITIAL=${I}" >> "${GITHUB_ENV}"
          echo "ARCH_GATE_REPO_CHANGED=${C}" >> "${GITHUB_ENV}"
          # ARCH_GATE_CREATOR_DIFF is intentionally NOT set — triggers Phase A mode

      - name: Run Architectural Gate (Phase A)
        run: python -m architectural_gate

      - name: Upload gate log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architectural-gate-log-phase-a
          path: architectural-gate-log.json
          if-no-files-found: ignore
