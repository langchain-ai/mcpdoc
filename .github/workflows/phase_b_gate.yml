# Phase B — Agent Patch Evaluation
#
# Runs when an AI agent produces a patch for a frozen task from Phase A.
# Evaluates the agent's patch against the creator's reference patch.
#
# Checks enforced (all five):
#   ✓ scope_score        — agent stayed within creator's file scope
#   ✓ blast_ratio        — agent wrote proportionally as much code as creator
#   ✓ api_surface_score  — no breaking public API changes
#   ✓ new_dependencies   — no unexpected new external packages
#   ✓ dead_code_count    — no dead code introduced
#
# The architectural_gate package is installed from aneesh-spec/Merge-Bench-Scripts.
#
# Usage:
#   Trigger manually via workflow_dispatch. Patch files must exist in the repo
#   under .github/patches/. Pass their paths relative to repo root.
#
# Example inputs:
#   agent_diff_path:   .github/patches/agent.diff
#   creator_diff_path: .github/patches/creator.diff
#   base_sha:          main   (branch, tag, or commit SHA for baseline tree)
#   head_sha:          agent-test-phase-b  (branch, tag, or commit SHA for changed tree)

name: Architecture Gate — Phase B (Agent Evaluation)

on:
  workflow_dispatch:
    inputs:
      agent_diff_path:
        description: "Repo-relative path to agent unified diff (e.g. .github/patches/agent.diff)"
        required: true
        default: ".github/patches/agent.diff"
      creator_diff_path:
        description: "Repo-relative path to creator unified diff (e.g. .github/patches/creator.diff)"
        required: true
        default: ".github/patches/creator.diff"
      base_sha:
        description: "Base branch/SHA for baseline repo tree (before state)"
        required: false
        default: "main"
      head_sha:
        description: "Head branch/SHA for changed repo tree (after state)"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  phase-b-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout task repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Merge-Bench-Scripts (architectural_gate source)
        uses: actions/checkout@v4
        with:
          repository: aneesh-spec/Merge-Bench-Scripts
          path: Merge-Bench-Scripts
          token: ${{ secrets.MERGE_BENCH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install architectural_gate from Merge-Bench-Scripts
        run: pip install ./Merge-Bench-Scripts

      - name: Materialize before/after repo trees
        shell: bash
        run: |
          set -euo pipefail
          I="${RUNNER_TEMP}/arch-gate-initial"
          C="${RUNNER_TEMP}/arch-gate-changed"
          rm -rf "$I" "$C"

          BASE="${{ inputs.base_sha }}"
          HEAD="${{ inputs.head_sha }}"

          # Resolve base SHA
          BASE_SHA=$(git rev-parse "${BASE:-main}")

          # Resolve head SHA — default to current HEAD if not provided
          if [ -n "${HEAD}" ]; then
            HEAD_SHA=$(git rev-parse "${HEAD}")
          else
            HEAD_SHA=$(git rev-parse HEAD)
          fi

          git worktree add "$I" "${BASE_SHA}"
          git worktree add "$C" "${HEAD_SHA}"

          echo "ARCH_GATE_REPO_INITIAL=${I}" >> "${GITHUB_ENV}"
          echo "ARCH_GATE_REPO_CHANGED=${C}" >> "${GITHUB_ENV}"
          echo "Baseline: ${BASE_SHA}, Head: ${HEAD_SHA}"

      - name: Set Phase B patch environment variables
        shell: bash
        run: |
          set -euo pipefail
          echo "ARCH_GATE_JSON_LOG=${GITHUB_WORKSPACE}/architectural-gate-log.json" >> "${GITHUB_ENV}"
          echo "ARCH_GATE_CHANGE_DIFF=${GITHUB_WORKSPACE}/${{ inputs.agent_diff_path }}" >> "${GITHUB_ENV}"
          echo "ARCH_GATE_CREATOR_DIFF=${GITHUB_WORKSPACE}/${{ inputs.creator_diff_path }}" >> "${GITHUB_ENV}"

      - name: Run Architectural Gate (Phase B)
        run: python -m architectural_gate

      - name: Upload gate log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architectural-gate-log-phase-b
          path: architectural-gate-log.json
          if-no-files-found: ignore
