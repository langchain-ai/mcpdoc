# Phase B — Agent Patch Evaluation
#
# Runs when an AI agent produces a patch for a frozen task from Phase A.
# Evaluates the agent's patch against the creator's reference patch.
#
# Checks enforced (all five):
#   ✓ scope_score        — agent stayed within creator's file scope
#   ✓ blast_ratio        — agent wrote proportionally as much code as creator
#   ✓ api_surface_score  — no breaking public API changes
#   ✓ new_dependencies   — no unexpected new external packages
#   ✓ dead_code_count    — no dead code introduced
#
# The architectural_gate package is installed from amanchaudhary-ops/Merge-Bench-Scripts (central repo).
# This workflow file is the only architectural gate artifact that lives in each task repo.

name: Architecture Gate — Phase B (Agent Evaluation)

on:
  workflow_dispatch:
    inputs:
      agent_diff_path:
        description: "Path to agent unified diff file"
        required: true
      creator_diff_path:
        description: "Path to creator unified diff file (frozen from Phase A)"
        required: true
      repo_initial_path:
        description: "Path to initial (baseline) repo tree (optional)"
        required: false
        default: ""
      repo_changed_path:
        description: "Path to changed repo tree after agent patch (optional)"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  phase-b-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout task repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Architectural_Gate (architectural_gate source)
        uses: actions/checkout@v4
        with:
          repository: aneesh-spec/Merge-Bench-Scripts
          path: Merge-Bench-Scripts
          token: ${{ secrets.MERGE_BENCH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install architectural_gate from Merge-Bench-Scripts
        run: pip install ./Merge-Bench-Scripts

      - name: Set Phase B environment variables
        shell: bash
        run: |
          set -euo pipefail
          echo "ARCH_GATE_JSON_LOG=${GITHUB_WORKSPACE}/architectural-gate-log.json" >> "${GITHUB_ENV}"
          echo "ARCH_GATE_CHANGE_DIFF=${{ inputs.agent_diff_path }}" >> "${GITHUB_ENV}"
          echo "ARCH_GATE_CREATOR_DIFF=${{ inputs.creator_diff_path }}" >> "${GITHUB_ENV}"
          if [ -n "${{ inputs.repo_initial_path }}" ]; then
            echo "ARCH_GATE_REPO_INITIAL=${{ inputs.repo_initial_path }}" >> "${GITHUB_ENV}"
          fi
          if [ -n "${{ inputs.repo_changed_path }}" ]; then
            echo "ARCH_GATE_REPO_CHANGED=${{ inputs.repo_changed_path }}" >> "${GITHUB_ENV}"
          fi

      - name: Run Architectural Gate (Phase B)
        run: python -m architectural_gate

      - name: Upload gate log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architectural-gate-log-phase-b
          path: architectural-gate-log.json
          if-no-files-found: ignore
